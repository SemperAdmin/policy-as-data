<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>policy-as-data — MARADMIN 051/23</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font: 16px/1.5 system-ui, sans-serif;
        max-width: 46rem; margin: 2rem auto; padding: 0 1rem;
      }
      h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
      .sub { color: #666; margin-top: 0; }
      form { display: grid; gap: 0.75rem; margin: 1.5rem 0; }
      label { display: grid; gap: 0.25rem; font-weight: 600; }
      input, select, button { font: inherit; padding: 0.4rem 0.5rem; }
      button { cursor: pointer; font-weight: 600; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
      #result { border-top: 1px solid #8884; padding-top: 1rem; }
      .badge { padding: 0.1rem 0.5rem; border-radius: 0.3rem; font-size: 0.85rem; vertical-align: middle; }
      .badge.APPROVE { background: #1b7f3722; color: #1b7f37; }
      .badge.DENY { background: #b3261e22; color: #b3261e; }
      .badge.UNVERIFIED { background: #9a640022; color: #9a6400; }
      .loud { background: #9a640014; border-left: 3px solid #9a6400; padding: 0.5rem 0.75rem; }
      .reasons { padding-left: 1.1rem; }
      .reasons li { margin-bottom: 0.75rem; }
      .reasons code { background: #8881; padding: 0.05rem 0.3rem; border-radius: 0.2rem; }
      .reasons p { margin: 0.25rem 0; }
      .cite { font-size: 0.85rem; color: #666; }
      .cid { font-family: ui-monospace, monospace; font-size: 0.75rem; }
      .cstatus { font-size: 0.7rem; padding: 0 0.3rem; border-radius: 0.2rem; }
      .cstatus.VERIFIED { background: #1b7f3722; color: #1b7f37; }
      .cstatus.UNVERIFIED { background: #9a640022; color: #9a6400; }
    </style>
  </head>
  <body>
    <h1>policy-as-data</h1>
    <p class="sub">
      MARADMIN 051/23 — Military Parental Leave Program. Deterministic, cited
      decisions. Confirmed policy and asserted policy are distinguished on the
      face of the output.
    </p>

    <form id="request-form">
      <div class="row">
        <label>Days requested
          <input id="requestedDays" type="number" min="0" value="5" />
        </label>
        <label>Days already used
          <input id="daysAlreadyUsed" type="number" min="0" value="0" />
        </label>
      </div>
      <div class="row">
        <label>Qualifying event
          <select id="eventType">
            <option value="BIRTH">Birth</option>
            <option value="ADOPTION">Adoption</option>
            <option value="LONG_TERM_FOSTER_PLACEMENT">Long-term foster placement</option>
          </select>
        </label>
        <label>Event date
          <input id="eventDate" type="date" value="2026-06-01" />
        </label>
      </div>
      <label>Leave start date
        <input id="leaveStartDate" type="date" value="2026-06-15" />
      </label>
      <button type="submit">Evaluate</button>
    </form>

    <div id="result"></div>

    <script type="module" src="./dist/web/main.js"></script>
  </body>
</html>
